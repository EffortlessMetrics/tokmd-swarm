name: Badge Endpoints

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  RIPR_VERSION: "0.7.0"

concurrency:
  group: badge-endpoints-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install ripr
        run: cargo install ripr --version "$RIPR_VERSION" --locked

      - name: Refresh badge endpoints
        run: cargo xtask badges

      # NOTE: This PR is created with the default GITHUB_TOKEN, so GitHub's
      # recursion guard suppresses `on: pull_request` workflow runs on it.
      # The required `Tokmd Rust Result` gate therefore does not start
      # automatically. To land a badge refresh PR:
      #   - Maintainer nudge (no secret): close then reopen the PR as a real
      #     user. The `reopened` event runs `Tokmd Rust Result`; merge on green.
      #   - Durable fix (needs a secret): set `token:` below to a PAT or
      #     GitHub App token so created PRs trigger workflows directly.
      - name: Open badge refresh PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/badge-endpoints
          title: "badge: refresh public endpoints"
          commit-message: "badge: refresh public endpoints"
          body: |
            Refreshes generated Shields endpoint JSON under `badges/`.

            Generated by:

            ```bash
            cargo xtask badges
            ```
