name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

jobs:
  sync:
    # Non-build control-plane lane (label sync action only). Routed to the CX23
    # nano tier; triggered by push to main / workflow_dispatch, so no fork PRs.
    runs-on:
      group: em-ci-nano
      labels: [self-hosted, linux, x64, em-ci, trusted-pr, workflow-nano]
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          token: ${{ secrets.GITHUB_TOKEN }}
