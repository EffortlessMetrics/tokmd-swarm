name: No-panic Policy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: no-panic-policy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -C debuginfo=0

jobs:
  check-no-panic-family:
    name: No-panic Family
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run no-panic family checker (strict)
        run: |
          set -euo pipefail
          mkdir -p target/tokmd/reports
          cargo xtask check-no-panic-family \
            --strict \
            --json-output target/tokmd/reports/no-panic-report.json \
            2> target/tokmd/reports/no-panic-stderr.txt

          {
            echo "## No-panic policy"
            echo ""
            echo "Strict gate passed."
            echo ""
            echo "Baseline generation command (run when panic-family debt changes):"
            echo '```'
            echo "cargo xtask no-panic-baseline --receipt-output policy/no-panic-baseline-receipt.json"
            echo '```'
            echo ""
            echo '```'
            cat target/tokmd/reports/no-panic-stderr.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload no-panic policy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: no-panic-policy-report
          path: target/tokmd/reports/
          if-no-files-found: ignore
          retention-days: 14
