name: Swarm GHCR

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "vendor/**"
      - "xtask/**"
      - ".github/workflows/swarm-ghcr.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: swarm-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and Push Swarm GHCR Image
    if: github.repository == 'EffortlessMetrics/tokmd-swarm'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/effortlessmetrics/tokmd-swarm
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push swarm Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=tokmd-swarm
            org.opencontainers.image.description=Workbench and agent runtime image for EffortlessMetrics/tokmd-swarm
            org.opencontainers.image.url=https://github.com/EffortlessMetrics/tokmd-swarm
            org.opencontainers.image.source=https://github.com/EffortlessMetrics/tokmd-swarm
            org.opencontainers.image.documentation=https://github.com/EffortlessMetrics/tokmd-swarm/blob/main/docs/specs/swarm-ghcr-image.md
            org.opencontainers.image.vendor=EffortlessMetrics
            org.opencontainers.image.licenses=MIT OR Apache-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Advisory public swarm GHCR manifest visibility
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          IMAGE="ghcr.io/effortlessmetrics/tokmd-swarm"
          DOCKER_CONFIG="$(mktemp -d)"
          export DOCKER_CONFIG

          echo "Checking unauthenticated manifest visibility for ${IMAGE}:main"
          if docker manifest inspect "${IMAGE}:main"; then
            echo "swarm_ghcr_public_visibility=pass tag=main"
          else
            echo "::warning title=Swarm GHCR public visibility pending::Unauthenticated docker manifest inspect denied for ${IMAGE}:main. Set GHCR package visibility with org package admin access. See docs/specs/swarm-ghcr-image.md and issue #264."
            echo "swarm_ghcr_public_visibility=pending tag=main"
            exit 1
          fi

      - name: Smoke test pushed image (authenticated)
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="ghcr.io/effortlessmetrics/tokmd-swarm:main"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" --version
