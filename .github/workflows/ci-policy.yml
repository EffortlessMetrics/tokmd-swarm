name: CI Policy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-policy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -C debuginfo=0

jobs:

  no-bare-self-hosted:
    name: No Bare Self-Hosted Routing
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Check runner routing
        run: scripts/check-no-bare-self-hosted.sh .github/workflows

  ci-lane-whitelist:
    name: CI Lane Whitelist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run CI lane whitelist linter
        run: |
          mkdir -p target/tokmd/reports
          cargo xtask ci-lane-whitelist \
            --workflows .github/workflows \
            --whitelist policy/ci-lane-whitelist.toml \
            --exceptions policy/ci-whitelist-exceptions.toml \
            --report-dir target/tokmd/reports \
            --strict

      - name: Upload lane whitelist report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-lane-whitelist-report
          path: target/tokmd/reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Append report to step summary
        if: always()
        run: |
          if [ -f target/tokmd/reports/ci-lane-whitelist-report.txt ]; then
            {
              echo ""
              cat target/tokmd/reports/ci-lane-whitelist-report.txt
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  ci-gate-contract-reference:
    name: CI Gate Contract (reference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Verify reference single-tight gate fixture
        run: |
          cargo xtask ci-gate-contract --check \
            --workflow fixtures/ci-gate-contract/reference-ci.yml

  ci-gate-contract-live-gap:
    name: CI Gate Contract (live gap)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Report live ci.yml migration gap (advisory until phase 2)
        run: |
          set +e
          cargo xtask ci-gate-contract --check --workflow .github/workflows/ci.yml
          status=$?
          {
            echo "## CI gate contract (live migration gap)"
            echo ""
            if [ "${status}" -eq 0 ]; then
              echo "Live \`.github/workflows/ci.yml\` satisfies the single-tight ub-review gate contract."
            else
              echo "Live \`.github/workflows/ci.yml\` does not yet match the phase-2 target."
              echo "Normative spec: \`docs/specs/ub-review-ci-gate.md\`."
              echo "Reference fixture: \`fixtures/ci-gate-contract/reference-ci.yml\`."
              echo "Tracking: issue #226."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
