schema = "tokmd.jules.active_goal.v1"
status = "active"
program = "code_intelligence"
lane = "code_intelligence_platform_audit"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
plan = "docs/plans/code-intelligence-platform-audit.md"
proof_observation_artifacts = "docs/ci/proof-observation-artifacts.md"
artifact_glossary = "docs/artifacts.md"
proof_policy = "ci/proof.toml"
next_program = "docs/NEXT.md"
architecture_plan = "docs/architecture-consolidation-plan.md"
review_packet = "docs/review-packet.md"
handoff_guide = "docs/handoff.md"
browser_guide = "docs/browser.md"
ast_foundation_adr = "docs/adr/0008-ast-foundation.md"
proof_observation_decision_adr = "docs/adr/0009-proof-observation-promotion-boundary.md"

[rules]
completion_audit = "map_objective_requirements_to_live_artifacts_before_declaring_completion"
github_actions_boundary = "keep_actions_as_runner_cache_artifact_shell"
proof_promotion = "do_not_promote_without_maintainer_decision"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
review_surface = "cockpit_remains_review_evidence_surface_until_a_separate_contract_exists"
ast_default_behavior = "do_not_change_default_receipts_or_browser_capabilities"
product_behavior = "do_not_change_public_tokmd_cli_or_receipt_schemas_without_a_plan"
architecture = "do_not_reopen_owner_module_cleanup_without_fresh_pressure"

[stop_conditions]
doc_artifacts = "cargo xtask doc-artifacts --check"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-code-intelligence-platform-audit.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-code-intelligence-platform-audit.json --evidence-json target/proof/proof-evidence-code-intelligence-platform-audit.json"
fmt = "cargo fmt-check"
diff_hygiene = "git diff --check"
