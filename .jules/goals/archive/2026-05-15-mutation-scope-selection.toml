schema = "tokmd.jules.active_goal.v1"
status = "complete"
program = "code_intelligence"
lane = "mutation_scope_selection"
outcome = "rust_owned_mutation_scope_selection"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
plan = "docs/plans/mutation-scope-selection.md"
proof_policy = "ci/proof.toml"
next_program = "docs/NEXT.md"
mutation_workflow = ".github/workflows/mutants.yml"
xtask_cli = "xtask/src/cli.rs"
xtask_main = "xtask/src/main.rs"
mutation_scope_task = "xtask/src/tasks/mutation_scope.rs"
artifact_glossary = "docs/artifacts.md"

[rules]
github_actions_boundary = "keep_actions_as_runner_cache_artifact_shell"
mutation_status = "do_not_promote_mutation_to_required_gate"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
product_behavior = "do_not_change_public_tokmd_cli_or_receipt_schemas"
scope = "move_changed_file_selection_only_before_rewriting_mutation_summary"

[stop_conditions]
mutation_scope_tests = "cargo test -p xtask mutation_scope --verbose"
mutation_scope_smoke = "cargo xtask mutation-scope --base origin/main --head HEAD --json-output target/mutation/mutation-scope.json --github-output target/mutation/mutation-scope.outputs"
doc_artifacts = "cargo xtask doc-artifacts --check"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-mutation-scope-selection.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-mutation-scope-selection.json --evidence-json target/proof/proof-evidence-mutation-scope-selection.json"
fmt = "cargo fmt-check"
diff_hygiene = "git diff --check"

[decision]
summary = "Mutation changed-file selection is now Rust-owned."
reason = "PR #2292 added cargo xtask mutation-scope, wired the manual mutation workflow to consume workflow-compatible outputs from xtask, uploaded mutation-scope.json with the existing mutation summary, and preserved advisory mutation behavior."
reopen_when = "A concrete workflow or consumer needs survivor-summary parsing, mutation execution orchestration, or cockpit/handoff consumption moved into Rust-owned evidence; start that as a fresh plan."
