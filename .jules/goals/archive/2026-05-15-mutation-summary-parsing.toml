schema = "tokmd.jules.active_goal.v1"
status = "complete"
program = "code_intelligence"
lane = "mutation_summary_parsing"
outcome = "rust_owned_mutation_summary_parsing"

[links]
source_of_truth = "docs/source-of-truth.md"
doc_artifacts_spec = "docs/specs/doc-artifacts.md"
doc_artifacts_plan = "docs/plans/doc-artifacts-check.md"
plan_readme = "docs/plans/README.md"
proposal_readme = "docs/proposals/README.md"
spec_readme = "docs/specs/README.md"
adr_readme = "docs/adr/README.md"
plan = "docs/plans/mutation-summary-parsing.md"
proof_policy = "ci/proof.toml"
next_program = "docs/NEXT.md"
mutation_workflow = ".github/workflows/mutants.yml"
xtask_cli = "xtask/src/cli.rs"
xtask_main = "xtask/src/main.rs"
mutation_scope_task = "xtask/src/tasks/mutation_scope.rs"
mutation_summary_task = "xtask/src/tasks/mutation_summary.rs"
artifact_glossary = "docs/artifacts.md"

[rules]
github_actions_boundary = "keep_actions_as_runner_cache_artifact_shell"
mutation_status = "do_not_promote_mutation_to_required_gate"
codecov_default_upload = "do_not_enable_without_maintainer_decision"
product_behavior = "do_not_change_public_tokmd_cli_or_receipt_schemas"
scope = "move_mutation_summary_parsing_only_before_rewriting_mutation_execution"

[stop_conditions]
mutation_summary_tests = "cargo test -p xtask mutation_summary --verbose"
mutation_summary_smoke = "cargo xtask mutation-summary --commit HEAD --base-ref main --scope-exceeded false --mutants-ran false --json-output target/mutation/mutants-summary.json --github-output target/mutation/mutation-summary.outputs"
doc_artifacts = "cargo xtask doc-artifacts --check"
docs_check = "cargo xtask docs --check"
proof_policy = "cargo xtask proof-policy --check"
affected_plan = "cargo xtask affected --base origin/main --head HEAD --json-output target/proof/affected-mutation-summary-parsing.json"
proof_plan = "cargo xtask proof --profile affected --base origin/main --head HEAD --plan --plan-json target/proof/proof-plan-mutation-summary-parsing.json --evidence-json target/proof/proof-evidence-mutation-summary-parsing.json"
fmt = "cargo fmt-check"
diff_hygiene = "git diff --check"

[decision]
summary = "Mutation summary and survivor parsing are now Rust-owned."
reason = "PR #2294 added cargo xtask mutation-summary, wired the manual mutation workflow to consume it, preserved mutants-summary.json plus status and survivor_count outputs, and kept mutation advisory."
reopen_when = "A concrete workflow or consumer needs mutation execution orchestration, cockpit/handoff mutation consumption, or broader mutation evidence promotion; start that as a fresh plan."
