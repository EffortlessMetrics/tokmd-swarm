schema = "tokmd.proof_policy.v1"

[defaults]
mutation_timeout_seconds = 300
coverage = "scoped"
fail_on_unknown_non_rust = true

[tools]
rust = "stable"
coverage = "cargo-llvm-cov"
javascript = "npm"

[[scope]]
name = "proof_control_plane"
kind = "rust"
paths = [
  ".github/workflows/ci.yml",
  "ci/proof.toml",
  "docs/NEXT.md",
  "xtask/src/cli.rs",
  "xtask/src/main.rs",
  "xtask/src/proof/**",
  "xtask/src/tasks/mod.rs",
  "xtask/src/tasks/affected.rs",
  "xtask/src/tasks/boundaries_check.rs",
  "xtask/src/tasks/fixture_blobs_check.rs",
  "xtask/src/tasks/proof_policy.rs",
  "xtask/src/tasks/proof_plan.rs",
  "xtask/tests/affected_w91.rs",
  "xtask/tests/fixture_blobs_w83.rs",
  "xtask/tests/proof_policy_w90.rs",
  "xtask/tests/proof_plan_w92.rs",
]
packages = ["xtask"]
proof = [
  "cargo xtask proof-policy --check",
  "cargo test -p xtask proof_policy --verbose",
  "cargo test -p xtask affected --verbose",
  "cargo test -p xtask fixture_blob --verbose",
  "cargo test -p xtask proof_plan --verbose",
]
mutation = false
coverage = false

[[scope]]
name = "tokmd_core_ffi"
kind = "rust"
paths = ["crates/tokmd-core/src/ffi.rs", "crates/tokmd-core/tests/**"]
packages = ["tokmd-core"]
proof = [
  "cargo test -p tokmd-core ffi",
  "cargo test -p tokmd-core --test ffi_parity_w53",
]
mutation = true
coverage = true

[[scope]]
name = "browser_runner"
kind = "non_rust"
paths = ["web/runner/**", "docs/capabilities/wasm.json"]
proof = [
  "npm --prefix web/runner test",
  "npm --prefix web/runner run check",
]
reason = "Browser worker and GitHub ingest logic are JavaScript/WASM-facing surfaces."
mutation = false
coverage = false

[[allow.workspace_area]]
name = "jules_knowledge_workspace"
paths = [".jules/**"]
reason = "Durable specs, investigations, friction notes, persona learnings, and generated indexes are allowed here."
discourage = [
  "raw terminal logs",
  "duplicated run transcripts",
  "large binary artifacts",
]

[[dependency_boundary]]
name = "retired_tokmd_config_must_not_return"
packages = ["*"]
forbid = ["tokmd-config"]
reason = "tokmd-config is retired; ownership lives in tokmd-settings, tokmd-core, and tokmd."

[[forbid.fixture_blob]]
name = "committed_crypto_fixture_blobs"
extensions = [
  "cer",
  "crt",
  "der",
  "jwk",
  "jwks",
  "key",
  "p12",
  "p8",
  "pem",
  "pfx",
  "pk8",
]
markers = [
  "BEGIN CERTIFICATE",
  "BEGIN EC PRIVATE KEY",
  "BEGIN OPENSSH PRIVATE KEY",
  "BEGIN PRIVATE KEY",
  "BEGIN RSA PRIVATE KEY",
]
allow = [
  ".claude/**",
  ".jules/**",
  "ci/proof.toml",
  "vendor/**",
  "xtask/src/tasks/fixture_blobs_check.rs",
]
reason = "Crypto material should be generated at runtime or explicitly documented in an allowlisted workspace area."
