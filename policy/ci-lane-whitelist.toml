proof_obligation       = "Run cargo xtask publish-surface --json --verify-publish."
evidence               = ["job logs"]
allowed_triggers       = ["pull_request", "push"]
duplicate_of           = ["nix_pr_package_gate"]
review_after           = "2026-06-07"
expires                = "2026-08-07"

# -----------------------------------------------------------------------
# Swarm routed frontdoor lanes
# -----------------------------------------------------------------------

# Retired phase 3 lanes (#299): the duplicate `em-routed-rust-small.yml`
# frontdoor was removed. Its routing now lives in the `Route CI runner`
# (route_ci_runner) job of `ci.yml`, and its check/test work is the single
# required `Tokmd Rust Result` (tokmd_rust_result) gate. Branch protection
# already required only `Tokmd Rust Result`, so no required check changed.
# - tokmd_rust_small_route        (Route Tokmd Rust Small)
# - tokmd_rust_small_self_hosted  (Tokmd Rust Small on Self Hosted)
# - tokmd_rust_small_github       (Tokmd Rust Small on GitHub Hosted)
# - tokmd_rust_small_result       (Tokmd Rust Small Result)

# -----------------------------------------------------------------------
# Push / main-only lanes
# -----------------------------------------------------------------------

[[lane]]
id               = "build_macos_push"
workflow         = ".github/workflows/ci.yml"
job              = "Build & Test (macOS)"
kind             = "rust"
tier             = "deep"
default_pr       = false
blocking         = false
runner           = "macos_latest"
base_lem         = 60
owner            = "platform/macos"
intent           = "Run all-features tests on macOS for main pushes only."
failure_mode     = "macOS-specific regression reaches a release without being caught."
proof_obligation = "Run cargo test --all-features on macOS."
evidence         = ["job logs"]
allowed_triggers = ["push"]
expensive        = true
expensive_reason = "macOS-hosted runner minutes are billed at 10× Linux."
duplicate_of     = []
review_after     = "2026-06-07"
expires          = "2026-11-07"

