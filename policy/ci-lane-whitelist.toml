expires          = "2026-11-07"

# -----------------------------------------------------------------------
# Build and risk-gated CI lanes
# -----------------------------------------------------------------------

# Retired phase 1 lanes (folded into tokmd_rust_result, #226 phase 2):
# - quality_gate (Quality Gate job)
# - proof_policy (Proof Policy job)
