schema_version = "1.0"
policy = "ci-lane-whitelist"
owner = "release/ci"
status = "advisory"
updated = "2026-05-07"

# CI lane whitelist: every CI item maps to purpose, cost, trigger, owner,
# and evidence. Reviewers and `cargo xtask ci-lane-whitelist` read from this
# file. Exceptions for default-PR expensive lanes live in
# `policy/ci-whitelist-exceptions.toml`.

[budget]
preferred_default_lem = 25
default_limit_lem     = 35
elevated_limit_lem    = 75
hard_limit_lem        = 125

[runner_multipliers]
ubuntu_latest      = 1.0
windows_latest     = 2.0
macos_latest       = 10.0
nix_build          = 4.0
external_ai_review = 4.0
em_ci_small        = 1.0

# -----------------------------------------------------------------------
# Frontdoor / cheap default-PR lanes
# -----------------------------------------------------------------------

[[lane]]
id               = "msrv_check"
workflow         = ".github/workflows/ci.yml"
job              = "MSRV Check"
kind             = "compatibility"
tier             = "frontdoor"
default_pr       = true
blocking         = true
runner           = "ubuntu_latest"
base_lem         = 5
owner            = "release/compat"
intent           = "Validate declared MSRV compatibility."
failure_mode     = "Repo claims MSRV support but fails to compile on that toolchain."
proof_obligation = "Run cargo check on the MSRV toolchain."
evidence         = ["job logs"]
allowed_triggers = ["pull_request", "push"]
duplicate_of     = []
review_after     = "2026-06-07"
expires          = "2026-11-07"

[[lane]]
id               = "route_ci_runner"
workflow         = ".github/workflows/ci.yml"
job              = "Route CI runner"
kind             = "planner"
tier             = "frontdoor"
default_pr       = true
blocking         = false
runner           = "ubuntu_latest"
base_lem         = 1
owner            = "release/ci"
intent           = "Choose self-hosted primary vs GitHub-hosted overflow for the single tight gate."
failure_mode     = "Gate job lands on the wrong runner class without a receipt."
proof_obligation = "Emit runner and runner_kind outputs from org runner discovery."
evidence         = ["job outputs"]
allowed_triggers = ["pull_request", "push"]
duplicate_of     = []
review_after     = "2026-07-07"
expires          = "2026-12-07"

[[lane]]
id               = "tokmd_rust_result"
workflow         = ".github/workflows/ci.yml"
job              = "Tokmd Rust Result"
kind             = "rust"
tier             = "frontdoor"
default_pr       = true
blocking         = true
runner           = "mixed"
base_lem         = 25
owner            = "release/ci"
intent           = "Single required check: concurrent gate, tests, proof-policy, and advisory ub-review."
failure_mode     = "Deterministic static floor or core tests reach main without the required gate passing."
proof_obligation = "Run cargo xtask gate --check, cargo test --all-features, and cargo xtask proof-policy --check concurrently; assert before job exit."
evidence         = ["target/ci-core/core.log", "target/ci-core/test.log", "target/ci-core/proof_policy.log", "job logs"]
allowed_triggers = ["pull_request", "push"]
duplicate_of     = []
review_after     = "2026-07-07"
expires          = "2026-12-07"

[[lane]]
id               = "affected_proof_plan"
workflow         = ".github/workflows/ci.yml"
job              = "Affected Proof Plan"
kind             = "planner"
tier             = "frontdoor"
default_pr       = true
blocking         = true
runner           = "ubuntu_latest"
base_lem         = 4
owner            = "proof"
intent           = "Generate affected proof artifacts for changed files."
failure_mode     = "Reviewers cannot see the proof plan for a PR's changed surface."
proof_obligation = "Run cargo xtask affected and proof --profile affected."
evidence = [
  "target/proof/affected.json",
  "target/proof/proof-plan.md",
  "target/proof/proof-evidence.json",
  "target/proof/executor-summary.json",
  "target/proof/executor-manifest.json",
]
allowed_triggers = ["pull_request"]
duplicate_of     = ["pr_plan_advisory"]
review_after     = "2026-06-07"
expires          = "2026-08-07"

[[lane]]
id               = "ci_detect_risk_packs"
workflow         = ".github/workflows/ci.yml"
job              = "Detect risk packs"
kind             = "planner"
tier             = "frontdoor"
default_pr       = true
blocking         = true
runner           = "ubuntu_latest"
base_lem         = 1
owner            = "release/ci"
intent           = "Classify changed paths into risk packs for conditional CI routing."
failure_mode     = "Risk-gated jobs skip changes that should have selected them."
proof_obligation = "Run the workflow path classifier and expose risk-pack outputs."
evidence         = ["job outputs"]
allowed_triggers = ["pull_request", "push"]
duplicate_of     = ["affected_proof_plan"]
review_after     = "2026-06-07"
expires          = "2026-11-07"

[[lane]]
id               = "fast_proof_run_advisory"
workflow         = ".github/workflows/ci.yml"
job              = "Fast Proof Run (Advisory)"
kind             = "proof"
tier             = "frontdoor"
default_pr       = true
blocking         = false
runner           = "ubuntu_latest"
base_lem         = 5
owner            = "proof"
intent           = "Run the fast proof profile on PRs as advisory observation evidence."
failure_mode     = "Fast proof-run regressions lose visibility before required promotion decisions."
proof_obligation = "Run cargo xtask proof --profile fast --run-required --allow-ci-required-execution."
evidence         = ["target/proof-run/proof-run-summary.json", "target/proof-run/proof-run-observation.json"]
allowed_triggers = ["pull_request"]
duplicate_of     = ["tokmd_rust_result", "affected_proof_plan"]
review_after     = "2026-06-07"
expires          = "2026-11-07"

