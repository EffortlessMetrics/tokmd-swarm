schema_version = 1

# ripr suppressions ledger.
#
# Each [[suppressions]] entry pins one accepted advisory finding:
#
#   kind       - "exposure_gap" or "test_efficiency".
#   finding_id - required for exposure_gap.
#   test       - required for test_efficiency.
#   path       - optional repo-relative file path for test_efficiency.
#   owner      - team/role.
#   reason     - why the test gap is intentional and explained.
#   expires    - optional ISO-8601 date.
#
# Don't suppress because a finding is annoying. Suppress because the
# test gap is intentional and explained.

# The ledger starts empty during the advisory phase.
