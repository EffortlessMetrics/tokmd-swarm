schema_version = "1.0"

[project]
repo = "tokmd"
framework = "rails"
root = ".rails"

[conventions]
proposal_prefix = "TOKMD-PROP"
spec_prefix = "TOKMD-SPEC"
adr_prefix = "TOKMD-ADR"
lane_prefix = "TOKMD-LANE"

[external_namespaces]
codex = ".codex"
speckit = ".spec"
claude = ".claude"
jules = ".jules"

[[artifact]]
id = "TOKMD-PROP-0001"
kind = "proposal"
path = ".rails/proposals/TOKMD-PROP-0001-rails-knowledge-base.md"
status = "draft"
owner = "rails-adoption"

[[artifact]]
id = "TOKMD-SPEC-0001"
kind = "spec"
path = ".rails/specs/TOKMD-SPEC-0001-rails-artifact-graph.md"
status = "draft"
owner = "rails-adoption"
linked_proposal = "TOKMD-PROP-0001"

[[artifact]]
id = "TOKMD-ADR-0001"
kind = "adr"
path = ".rails/adr/TOKMD-ADR-0001-rails-framework-footprint.md"
status = "accepted"
owner = "rails-adoption"
linked_specs = ["TOKMD-SPEC-0001"]

[[lane]]
id = "rails-adoption"
name = "Rails adoption"
path = ".rails/lanes/rails-adoption/tracker.toml"
status = "active"
owner = "repo-maintainers"
